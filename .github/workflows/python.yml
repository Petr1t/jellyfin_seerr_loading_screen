name: Python (jslsd)

on:
  push:
    branches: [main]
    paths:
      - 'jslsd/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'jslsd/**'
      - '.github/workflows/python.yml'

jobs:
  test:
    runs-on: [self-hosted, linux, paradecentral]
    strategy:
      matrix:
        # Single version (3.12) — paradecentral runs 3.12, 3.11 matrix-cell
        # was costing CI minutes without catching anything we ship against.
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # fonts-dejavu-core is preinstalled on the self-hosted paradecentral
      # runner; we don't have passwordless sudo here for apt-get.

      - name: Install jslsd
        working-directory: jslsd
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        working-directory: jslsd
        run: ruff check .

      - name: Test
        working-directory: jslsd
        run: pytest -v --tb=short

      - name: Build wheel
        working-directory: jslsd
        run: |
          pip install build
          python -m build --wheel
