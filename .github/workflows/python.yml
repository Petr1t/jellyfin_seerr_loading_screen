name: Python (jslsd)

on:
  push:
    branches: [main]
    paths:
      - 'jslsd/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'jslsd/**'
      - '.github/workflows/python.yml'

jobs:
  test:
    runs-on: [self-hosted, linux, paradecentral]
    # Self-hosted runner shares /home/pet with the host, where the user's
    # site-packages bleeds into setup-python's isolated install. PYTHONNOUSERSITE
    # blocks that so CI sees only what the workflow installed.
    env:
      PYTHONNOUSERSITE: "1"
    strategy:
      matrix:
        # Single version (3.12) — paradecentral runs 3.12, 3.11 matrix-cell
        # was costing CI minutes without catching anything we ship against.
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # fonts-dejavu-core is preinstalled on the self-hosted paradecentral
      # runner; we don't have passwordless sudo here for apt-get.

      - name: Install jslsd
        working-directory: jslsd
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # `python -m` invocation works regardless of PATH — on the self-hosted
      # runner, setup-python's bin dir is sometimes not on PATH for shell steps.
      - name: Lint
        working-directory: jslsd
        run: python -m ruff check .

      - name: Test
        working-directory: jslsd
        run: python -m pytest -v --tb=short

      - name: Build wheel
        working-directory: jslsd
        run: |
          pip install build
          python -m build --wheel
